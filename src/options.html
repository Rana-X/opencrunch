<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCrunch Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <div class="eyebrow">OpenCrunch</div>
        <h1>Google Sheets Settings</h1>
        <p class="muted">
          Save the Google Apps Script web app URL and target spreadsheet details for the extension.
        </p>

        <label>
          <span>Apps Script Web App URL</span>
          <input id="google-script-url" type="url" autocomplete="off" />
        </label>

        <label>
          <span>Spreadsheet ID</span>
          <input id="google-spreadsheet-id" type="text" autocomplete="off" />
        </label>

        <label>
          <span>Sheet Name</span>
          <input id="google-sheet-name" type="text" autocomplete="off" />
        </label>

        <label>
          <span>Shared Secret (optional)</span>
          <input id="google-shared-secret" type="password" autocomplete="off" />
        </label>

        <div class="actions">
          <button id="save-settings" class="primary" type="button">Save Settings</button>
          <button id="test-connection" class="secondary" type="button">Test Connection</button>
        </div>

        <pre id="status" class="status">No status yet.</pre>
      </section>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
</html>
